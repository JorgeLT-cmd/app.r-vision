<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://tycwqowoiootnedzzvi.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eWN3cW93b2lvb3RuZWR6enZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjg4MzIsImV4cCI6MjA5NTkwNDgzMn0.CSChBAo1wRlhiChhw8fA_ve59DAyLvmovKyxvgqeIjM';
    
    // Configuration pro pour forcer Chrome à accepter la requête sans bloquer
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey, {
        auth: {
            persistSession: true,
            autoRefreshToken: true
        },
        global: {
            headers: { 'X-Client-Info': 'supabase-js-web' }
        }
    });

    let niveauSelectionne = "";
    let matiereSelectionnee = "";
    let listeQuiz = [];
    let indexQuestion = 0;
    let currentUser = null;

    const coursDictionnaire = {
        "3ème": {
            "📐 Mathématiques": "<h3>Chapitre 1 : Arithmétique</h3><p>Un nombre premier est un entier naturel qui admet exactement deux diviseurs distincts : 1 et lui-même.</p><h3>Chapitre 2 : Théorème de Thalès</h3><p>Nécessite deux droites parallèles coupées par deux droites sécantes pour établir l'égalité des rapports.</p>",
            "📚 Français": "<h3>Chapitre 1 : L'Adverbe</h3><p>Mots invariables modifiant un verbe ou un adjectif. Souvent formés en '-ment'.</p><h3>Chapitre 2 : Les Figures de Style</h3><p>La comparaison utilise un outil comparatif ('comme'), pas la métaphore.</p>",
            "🌍 Histoire-Géo": "<h3>Chapitre 1 : Première Guerre Mondiale</h3><p>Phase de violence de masse de 1914 à 1918 (guerre des tranchées).</p><h3>Chapitre 2 : Aires Urbaines</h3><p>Définies par un pôle urbain dynamique entouré de sa couronne périurbaine.</p>",
            "🇬🇧 Anglais": "<h3>Fiches d'Anglais</h3><p>Utilise les modules de quiz pour réviser la grammaire (Présents, Passés, Conditionnels et Modaux).</p>",
            "🛠️ Technologie": "<h3>Fiches de Technologie</h3><p>Révise les réseaux informatiques, la programmation Scratch/Python et le design d'objets via l'onglet Quiz.</p>"
        }
    };

    function naviguerVers(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function inscription() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const pseudo = document.getElementById('reg-pseudo').value;
        
        const { data, error } = await supabaseClient.auth.signUp({ 
            email, 
            password, 
            options: { data: { display_name: pseudo } } 
        });
        
        if (error) {
            alert("Erreur Inscription : " + error.message);
        } else {
            loginReussi(data.user);
        }
    }

    async function connexion() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({ 
            email, 
            password 
        });
        
        if (error) {
            alert("Erreur Connexion : " + error.message);
        } else {
            loginReussi(data.user);
        }
    }

    function loginReussi(user) {
        if (!user) return;
        currentUser = user;
        document.getElementById('user-display').innerText = `👤 ${user.user_metadata.display_name || user.email}`;
        
        if(user.email.includes('admin') || user.email === 'ropoeqggndtpnwyfynsf@supabase.co') {
            document.getElementById('admin-zone').style.display = "block";
        } else {
            document.getElementById('admin-zone').style.display = "none";
        }
        
        naviguerVers('screen-dashboard');
    }

    async function deconnexion() {
        await supabaseClient.auth.signOut();
        currentUser = null;
        naviguerVers('screen-login');
    }

    function choisirNiveau(niv) { 
        niveauSelectionne = niv; 
        document.getElementById('display-level').innerText = "Niveau : " + niv; 
        naviguerVers('screen-subjects'); 
    }
    
    function choisirMatiere(mat) { 
        matiereSelectionnee = mat; 
        document.getElementById('display-subject').innerText = mat; 
        naviguerVers('screen-tools');
        recupererQuiz();
        genererCours();
    }

    async function recupererQuiz() {
        const { data, error } = await supabaseClient
            .from('quizzes')
            .select('*')
            .eq('level', niveauSelectionne)
            .eq('subject', matiereSelectionnee)
            .order('id', { ascending: true });
            
        if (!error && data && data.length > 0) { 
            listeQuiz = data; 
            indexQuestion = 0; 
            afficherQuestion(); 
        } else { 
            document.getElementById('quiz-question').innerText = "Aucun quiz disponible pour le moment."; 
            document.getElementById('quiz-options').innerHTML = ""; 
            document.getElementById('quiz-feedback').style.display = "none";
            document.getElementById('btn-next-quiz').style.display = "none";
        }
    }

    function afficherQuestion() {
        if(listeQuiz.length === 0) return;
        let q = listeQuiz[indexQuestion];
        document.getElementById('quiz-question').innerText = `[Chapitre ${q.chapter_number} : ${q.title_chapter}] \n\n ${q.question}`;
        let html = "";
        
        let indexCorrectAjuste = q.reponse_index;
        if (q.reponse_index >= 1 && q.reponse_index <= q.options.length) {
            indexCorrectAjuste = q.reponse_index - 1; 
        }

        q.options.forEach((opt, idx) => { 
            let explSafe = q.explication ? q.explication.replace(/'/g, "\\'").replace(/"/g, '\\"') : "";
            html += `<button class="card-btn" onclick="validerReponse(${idx}, ${indexCorrectAjuste}, '${explSafe}')">${opt}</button>`; 
        });
        document.getElementById('quiz-options').innerHTML = html;
        document.getElementById('quiz-feedback').style.display = "none";
        document.getElementById('btn-next-quiz').style.display = "none";
    }

    function validerReponse(choix, correct, explication) {
        let fb = document.getElementById('quiz-feedback');
        if(choix === correct) { 
            fb.innerText = "🎉 Bonne réponse ! \n" + explication; 
            fb.className = "quiz-feedback success"; 
        } else { 
            fb.innerText = "❌ Mauvaise réponse. \n" + explication; 
            fb.className = "quiz-feedback error"; 
        }
        document.getElementById('btn-next-quiz').style.display = "block";
    }

    function chargerProchaineQuestion() { 
        indexQuestion = (indexQuestion + 1) % listeQuiz.length; 
        afficherQuestion(); 
    }

    function genererCours() {
        let content = document.getElementById('lessons-content');
        if(coursDictionnaire[niveauSelectionne] && coursDictionnaire[niveauSelectionne][matiereSelectionnee]) {
            content.innerHTML = `<div class="chapter-box">${coursDictionnaire[niveauSelectionne][matiereSelectionnee]}</div>`;
        } else {
            content.innerHTML = `<div class="chapter-box"><p>Fiche synthèse en cours de rédaction.</p></div>`;
        }
    }

    function demanderIa() {
        let inp = document.getElementById('ai-input');
        if(!inp.value.trim()) return;
        let box = document.getElementById('ai-messages');
        let question = inp.value;
        box.innerHTML += `<div class="chat-msg msg-user"><strong>Toi:</strong> ${question}</div>`;
        inp.value = "";
        box.scrollTop = box.scrollHeight;

        setTimeout(() => {
            let reponseBase = `En tant que tuteur de ${niveauSelectionne}, je te conseille de retenir la méthode fondamentale pour l'épreuve de ${matiereSelectionnee}. `;
            if(question.toLowerCase().includes('delta') || question.toLowerCase().includes('second degre')) {
                reponseBase += "Si Delta > 0, deux racines réelles existent : (-b-√Δ)/(2a) et (-b+√Δ)/(2a).";
            } else if (question.toLowerCase().includes('exponentielle') || question.toLowerCase().includes('exp')) {
                reponseBase += "L'exponentielle est toujours strictement positive sur R et exp(a+b) = exp(a)*exp(b).";
            } else {
                reponseBase += "Prends le temps d'isoler les mots-clés, structure ton argumentation par étapes et vérifie tes formules à l'aide de ta fiche.";
            }
            box.innerHTML += `<div class="chat-msg msg-ai"><strong>Prof Virtuel:</strong> ${reponseBase}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 800);
    }

    async function creerQuizAdmin() {
        const level = document.getElementById('adm-level').value;
        const subject = document.getElementById('adm-subject').value;
        const chapter_number = parseInt(document.getElementById('adm-chap-num').value);
        const title_chapter = document.getElementById('adm-chap-title').value;
        const question = document.getElementById('adm-question').value;
        const options = [
            document.getElementById('adm-o0').value,
            document.getElementById('adm-o1').value,
            document.getElementById('adm-o2').value,
            document.getElementById('adm-o3').value
        ];
        
        const reponse_index = parseInt(document.getElementById('adm-correct').value) + 1;
        const explication = document.getElementById('adm-expl').value;

        if(!title_chapter || !question || !options[0] || !options[1]) {
            alert("Veuillez remplir au moins le titre, la question et deux options.");
            return;
        }

        const { error } = await supabaseClient.from('quizzes').insert([{
            level, subject, chapter_number, title_chapter, question, options, reponse_index, explication
        }]);

        if(error) {
            alert("Erreur lors de l'ajout : " + error.message);
        } else {
            alert("🎉 Question ajoutée avec succès !");
            naviguerVers('screen-dashboard');
        }
    }
</script>
</body>
</html>
